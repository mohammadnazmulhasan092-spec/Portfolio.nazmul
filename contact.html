  <main>
    <div class="page-hero">

    </div>

    <div style="max-width:700px;margin:0 auto 40px;padding:0 20px;text-align:center;">
      <div style="font-family:var(--font-code);font-size:13px;color:var(--text-dim);line-height:2;">

    <div class="contact-grid" id="contact-grid">
      <div class="empty-state" style="grid-column:1/-1;">LOADING CHANNELS...</div>
    </div>
  </main>

  <footer class="site-footer" data-cms-section="footer">
    <span class="blink-cursor footer-copy">© All Rights Reserved</span>

  <script type="module">
    import { subscribeSetting } from './supabase.js';
    import {
      initCursor, initNavUnderline, initGlitchEffects, initMobileMenu, initAudio, initLoader, escapeHtml, initBgSceneAll
    } from './script.js';

    const DEFAULTS = {
      facebook: 'https://facebook.com/',
      github:   'https://github.com/',
      telegram: 'https://t.me/username',
      email:    'mohammadnazmulhasan092@gmail.com'
    };

    document.addEventListener('DOMContentLoaded', () => {
      initLoader(); initCursor(); initNavUnderline(); initBgSceneAll();
      initGlitchEffects(); initMobileMenu(); initAudio();

      subscribeSetting('contact', (d) => {
        d = d || {};
        const facebook = d.facebook || DEFAULTS.facebook;
        const github   = d.github   || DEFAULTS.github;
        const telegram = d.telegram || DEFAULTS.telegram;
        const email    = d.email    || DEFAULTS.email;

        document.getElementById('contact-grid').innerHTML = `
          <a href="${escapeHtml(facebook)}" target="_blank" rel="noopener" class="contact-card premium-contact">
            <div class="contact-icon" style="color:#1877f2;">📘</div>
            <div class="contact-name">FACEBOOK</div>
            <div class="contact-handle">${escapeHtml(facebook)}</div>
            <div style="margin-top:10px;font-family:var(--font-main);font-size:9px;letter-spacing:3px;color:var(--text-dim);">&gt; OPEN PROFILE</div>
          </a>
          <a href="${escapeHtml(github)}" target="_blank" rel="noopener" class="contact-card premium-contact">
            <div class="contact-icon">🐙</div>
            <div class="contact-name">GITHUB</div>
            <div class="contact-handle">${escapeHtml(github)}</div>
            <div style="margin-top:10px;font-family:var(--font-main);font-size:9px;letter-spacing:3px;color:var(--text-dim);">&gt; OPEN PROFILE</div>
          </a>
          <a href="${escapeHtml(telegram)}" target="_blank" rel="noopener" class="contact-card premium-contact">
            <div class="contact-icon" style="color:#29b6f6;">✈️</div>
            <div class="contact-name">TELEGRAM</div>
            <div class="contact-handle">${escapeHtml(telegram)}</div>
            <div style="margin-top:10px;font-family:var(--font-main);font-size:9px;letter-spacing:3px;color:var(--text-dim);">&gt; OPEN CHANNEL</div>
          </a>
          <a href="mailto:${escapeHtml(email)}" class="contact-card premium-contact">
            <div class="contact-icon" style="color:#ff5252;">📧</div>
            <div class="contact-name">EMAIL</div>
            <div class="contact-handle">${escapeHtml(email)}</div>
            <div style="margin-top:10px;font-family:var(--font-main);font-size:9px;letter-spacing:3px;color:var(--text-dim);">&gt; COMPOSE</div>
          </a>
        `;
      });
    });
  </script>
