<html lang="en">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:ital,wght@0,400..900;1,400..900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@300;400;500;700&family=Audiowide&family=Press+Start+2P&family=VT323&family=Major+Mono+Display&family=Rajdhani:wght@400;500;600;700&family=Russo+One&family=Dancing+Script:wght@500;700&family=Italianno&family=Montserrat:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&family=League+Spartan:wght@400;700;900&family=Anton&family=Bebas+Neue&family=Archivo+Black&family=Raleway:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Bodoni+Moda:wght@400;700;900&family=Pacifico&family=Lobster&family=Satisfy&family=Allura&family=Great+Vibes&family=Kaushan+Script&family=Sacramento&family=Parisienne&family=Alex+Brush&family=Yellowtail&family=Merienda:wght@400;700;900&family=Courgette&family=Marck+Script&family=Arizonia&family=Tangerine:wght@400;700&family=Grand+Hotel&display=swap" rel="stylesheet" />
  <meta name="theme-color" content="#000000" />
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Scheherazade+New:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursor-trail"></div>
  <div class="scanlines"></div>
  <div class="grid-bg"></div>
  <div class="noise-overlay"></div>

  <nav>
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <div class="logo-circle">
          <img id="header-logo-img" class="logo-circle-img" alt="Logo" style="display:none;" />
          <div class="logo-circle-inner" id="header-logo-fallback">MNH</div>
        </div>
        <span class="logo-text">PORTFOLIO</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">HOME</a></li>
        <li><a href="educational.html" class="active">EDUCATIONAL QUALIFICATIONS</a></li>
        <li><a href="contact.html">CONTACT</a></li>
        <div class="nav-underline"></div>
      </ul>
      <div class="nav-right">
        <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobile-menu"><span></span><span></span><span></span></button>
        <div class="admin-btn" onclick="window.location='admin.html'">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
    <div class="mobile-menu" id="mobile-menu" role="navigation" aria-label="Mobile navigation">
      <a href="index.html">HOME</a>
      <a href="educational.html">EDUCATIONAL QUALIFICATIONS</a>
      <a href="contact.html">CONTACT</a>
    </div>
  </nav>

  <main>
    <div class="page-hero">
      <div class="page-title">EDUCATIONAL QUALIFICATIONS</div>
      <div class="page-subtitle">// KNOWLEDGE DATABASE</div>
    </div>

    <div class="edu-timeline" id="edu-timeline">
      <div class="empty-state">LOADING DATABASE...</div>
    </div>
  </main>

  <footer class="site-footer" data-cms-section="footer">
    <span class="blink-cursor footer-copy">© All Rights Reserved</span>
  </footer>

  <script type="module">
    import { subscribeTable } from './supabase.js';
    import {
      initCursor, initNavUnderline, initGlitchEffects, initMobileMenu, initAudio, escapeHtml, initBgSceneAll
    } from './script.js';

    const DEFAULT_EDU = [
      { id: 'd1', cat: 'SCHOOL', title: 'Primary & Secondary Education', description: 'Completed foundational education with strong academic performance.', year: '2020' },
      { id: 'd2', cat: 'SKILLS', title: 'Cybersecurity & Ethical Hacking', description: 'Self-taught ethical hacking, networking fundamentals, Linux, and penetration testing basics.', year: '90%' },
      { id: 'd3', cat: 'SKILLS', title: 'Web Development', description: 'HTML, CSS, JavaScript — building interactive and modern web experiences.', year: '85%' },
      { id: 'd4', cat: 'SKILLS', title: 'Python Programming', description: 'Python scripting for automation, data processing, and security tools.', year: '75%' },
      { id: 'd5', cat: 'CERTIFICATIONS', title: 'Cybersecurity Fundamentals', description: 'Online certification in cybersecurity fundamentals and network security.', year: '2023' },
      { id: 'd6', cat: 'LEARNING', title: 'Currently Learning', description: 'Advanced penetration testing, CTF competitions, and bug bounty methodologies.', year: 'ONGOING' }
    ];

    const isSkill = (e) => e.cat === 'SKILLS' && e.year && e.year.includes('%');

    function renderEntries(entries) {
      const container = document.getElementById('edu-timeline');
      if (!entries.length) {
        container.innerHTML = '<div class="empty-state">// NO EDUCATIONAL DATA YET<br><br><span style="font-size:11px;">[ADMIN can add entries via Admin Panel]</span></div>';
        return;
      }
      container.innerHTML = entries.map(e => `
        <div class="edu-item">
          <div class="edu-dot"></div>
          <div class="edu-content">
            <div class="edu-label">${escapeHtml(e.cat)}</div>
            <div class="edu-title">${escapeHtml(e.title)}</div>
            ${e.description ? `<div class="edu-desc">${escapeHtml(e.description)}</div>` : ''}
            ${isSkill(e) ? `
              <div class="progress-wrap" style="margin-top:10px;">
                <div class="progress-label">
                  <span>PROFICIENCY</span>
                  <span>${escapeHtml(e.year)}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${escapeHtml(e.year)}"></div>
                </div>
              </div>
            ` : e.year ? `
              <div style="margin-top:8px;font-family:var(--font-main);font-size:10px;color:var(--neon-red);letter-spacing:2px;">[${escapeHtml(e.year)}]</div>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      initCursor(); initNavUnderline(); initBgSceneAll();
      initGlitchEffects(); initMobileMenu(); initAudio();

      subscribeTable('educational', (allEntries) => {
        const entries = allEntries.filter(e => e.published !== false);
        renderEntries(entries.length ? entries : DEFAULT_EDU);
      }, { order: 'created_at', ascending: true });
    });
  </script>
</body>
</html>
